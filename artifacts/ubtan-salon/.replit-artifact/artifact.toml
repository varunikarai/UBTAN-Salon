kind = "web"
previewPath = "/"
title = "UBTAN Salon"
version = "1.0.0"
id = "artifacts/ubtan-salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25585

[services.development]
run = "pnpm --filter @workspace/ubtan-salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ubtan-salon", "run", "build" ]
publicDir = "artifacts/ubtan-salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25585"
BASE_PATH = "/"
